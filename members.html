<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members | Dr. 姓名</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#334155',
                        secondary: '#475569',
                        accent: '#64748b',
                        light: '#f8fafc',
                        dark: '#334155'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Georgia', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
        }
    </style>
</head>
<body class="bg-light font-sans text-dark">
    <!-- 导航栏 -->
    <nav class="bg-primary text-white shadow-md fixed w-full z-10">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold">Dr. 姓名</a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="hover:text-accent transition-all-300">Home</a>
                    <a href="publications.html" class="hover:text-accent transition-all-300">Publications</a>
                    <a href="members.html" class="hover:text-accent transition-all-300">Members</a>
                    <a href="researches.html" class="hover:text-accent transition-all-300">Researches</a>
                    <a href="join.html" class="hover:text-accent transition-all-300">Join Us</a>
                </div>
                <button class="md:hidden text-white focus:outline-none">
                    <i class="fa fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <header class="bg-gradient-to-r from-primary to-secondary text-white pt-24 pb-16">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 text-shadow editable" contenteditable="false">Members</h1>
            <p class="text-lg mb-8 editable" contenteditable="false">Team members of Dr. 姓名's research group</p>
        </div>
    </header>

    <!-- 团队成员 -->
    <section class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <!-- PI -->
            <h2 class="text-3xl font-bold mb-8 text-center editable" contenteditable="false">PI</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16" id="piContainer">
                <!-- 空容器，用于添加PI -->
            </div>

            <!-- Now (当前成员) -->
            <h2 class="text-3xl font-bold mb-8 text-center editable" contenteditable="false">Now</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="currentContainer">
                <!-- 空容器，用于添加当前成员 -->
            </div>

            <!-- Alumni (校友) -->
            <h2 class="text-3xl font-bold mt-16 mb-8 text-center editable" contenteditable="false">Alumni</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8" id="alumniContainer">
                <!-- 空容器，用于添加校友 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-8">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <p>&copy; 2026 Dr. 姓名. 保留所有权利.</p>
                </div>
                <div class="flex space-x-6">
                    <a href="index.html" class="hover:text-accent transition-all-300">Home</a>
                    <a href="publications.html" class="hover:text-accent transition-all-300">Publications</a>
                    <a href="members.html" class="hover:text-accent transition-all-300">Members</a>
                    <a href="researches.html" class="hover:text-accent transition-all-300">Researches</a>
                    <a href="join.html" class="hover:text-accent transition-all-300">Join Us</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 登录验证功能
            let isAuthenticated = false;
            let isEditing = false;
            const adminUsername = 'admin';
            const adminPassword = 'password'; // 这里可以根据需要修改密码

            // 创建登录对话框
            const loginModal = document.createElement('div');
            loginModal.id = 'loginModal';
            loginModal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden';
            loginModal.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-bold">管理员登录</h3>
                        <button id="closeLoginModal" class="text-gray-500 hover:text-gray-700">
                            <i class="fa fa-times text-xl"></i>
                        </button>
                    </div>
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">用户名</label>
                            <input type="text" id="loginUsername" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent" required>
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 font-medium mb-2">密码</label>
                            <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent" required>
                        </div>
                        <div class="flex justify-end space-x-4">
                            <button type="button" id="cancelLogin" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">取消</button>
                            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-secondary">登录</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(loginModal);

            // 添加编辑模式切换按钮（使用图标）
            const editButton = document.createElement('button');
            editButton.innerHTML = '<i class="fa fa-pencil"></i>';
            editButton.title = '编辑模式';
            editButton.className = 'fixed bottom-8 right-8 bg-primary text-white w-12 h-12 rounded-full shadow-lg z-20 hover:bg-secondary transition-all-300 flex items-center justify-center';
            document.body.appendChild(editButton);

            // 导航栏滚动效果
            window.addEventListener('scroll', function() {
                const nav = document.querySelector('nav');
                if (window.scrollY > 100) {
                    nav.classList.add('py-2');
                    nav.classList.remove('py-3');
                } else {
                    nav.classList.add('py-3');
                    nav.classList.remove('py-2');
                }
            });

            // 登录功能
            const loginForm = document.getElementById('loginForm');
            const closeLoginModal = document.getElementById('closeLoginModal');
            const cancelLogin = document.getElementById('cancelLogin');

            // 显示登录对话框
            function showLoginModal() {
                document.getElementById('loginModal').classList.remove('hidden');
            }

            // 隐藏登录对话框
            function hideLoginModal() {
                document.getElementById('loginModal').classList.add('hidden');
            }

            // 登录表单提交
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;

                if (username === adminUsername && password === adminPassword) {
                    isAuthenticated = true;
                    hideLoginModal();
                } else {
                    alert('用户名或密码错误');
                }
            });

            // 关闭登录对话框
            closeLoginModal.addEventListener('click', hideLoginModal);
            cancelLogin.addEventListener('click', hideLoginModal);



            // 本地存储功能
            function saveMembers() {
                try {
                    const membersData = {
                        hero: {
                            title: document.querySelector('header h1').textContent,
                            description: document.querySelector('header p').textContent
                        },
                        pis: [],
                        current: [],
                        alumni: []
                    };
                    
                    // 保存PI信息
                    const piCards = document.querySelectorAll('#piContainer > div');
                    piCards.forEach(card => {
                        try {
                            membersData.pis.push({
                                name: card.querySelector('h3').textContent,
                                title: card.querySelector('p:nth-child(2)').textContent,
                                info: card.querySelector('p:nth-child(3)').textContent,
                                image: card.querySelector('img').src
                            });
                        } catch (e) {
                            console.error('Error saving PI:', e);
                        }
                    });
                    
                    // 保存当前成员
                    const currentMembers = document.querySelectorAll('#currentContainer > div');
                    currentMembers.forEach(member => {
                        try {
                            membersData.current.push({
                                name: member.querySelector('h4').textContent,
                                title: member.querySelector('p:nth-child(2)').textContent,
                                research: member.querySelector('p:nth-child(3)').textContent,
                                image: member.querySelector('img') ? member.querySelector('img').src : ''
                            });
                        } catch (e) {
                            console.error('Error saving current member:', e);
                        }
                    });
                    
                    // 保存校友
                    const alumniMembers = document.querySelectorAll('#alumniContainer > div');
                    alumniMembers.forEach(member => {
                        try {
                            membersData.alumni.push({
                                name: member.querySelector('h4').textContent,
                                degree: member.querySelector('p:nth-child(2)').textContent,
                                position: member.querySelector('p:nth-child(3)').textContent
                            });
                        } catch (e) {
                            console.error('Error saving alumni member:', e);
                        }
                    });
                    
                    localStorage.setItem('boxlabMembers', JSON.stringify(membersData));
                    console.log('Members data saved successfully');
                } catch (e) {
                    console.error('Error saving members data:', e);
                }
            }
            
            function loadMembers() {
                try {
                    const savedMembers = localStorage.getItem('boxlabMembers');
                    if (savedMembers) {
                        const membersData = JSON.parse(savedMembers);
                        
                        // 加载英雄区域内容
                        if (membersData.hero) {
                            document.querySelector('header h1').textContent = membersData.hero.title;
                            document.querySelector('header p').textContent = membersData.hero.description;
                        }
                        
                        // 加载PI数据
                        if (membersData.pis && membersData.pis.length > 0) {
                            const piContainer = document.getElementById('piContainer');
                            if (piContainer) {
                                piContainer.innerHTML = '';
                                
                                membersData.pis.forEach(pi => {
                                    try {
                                        const piElement = document.createElement('div');
                                        piElement.className = 'bg-white rounded-lg shadow-md p-8 card-hover transition-all-300';
                                        piElement.innerHTML = `
                                            <div class="flex flex-col items-center">
                                                <div class="w-48 h-48 rounded-full overflow-hidden mb-6">
                                                    <img src="${pi.image}" alt="${pi.name}" class="w-full h-full object-cover">
                                                </div>
                                                <div class="text-center">
                                                    <h3 class="text-2xl font-bold mb-2 editable" contenteditable="false">${pi.name}</h3>
                                                    <p class="text-gray-600 mb-4 editable" contenteditable="false">${pi.title}</p>
                                                    <p class="text-gray-600 mb-4 editable" contenteditable="false">${pi.info}</p>
                                                    <div class="flex justify-center space-x-4 mt-4">
                                                        <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                                            <i class="fa fa-envelope text-xl"></i>
                                                        </a>
                                                        <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                                            <i class="fa fa-google-scholar text-xl"></i>
                                                        </a>
                                                        <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                                            <i class="fa fa-linkedin text-xl"></i>
                                                        </a>
                                                        <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                                            <i class="fa fa-researchgate text-xl"></i>
                                                        </a>
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                                        piContainer.appendChild(piElement);
                                    } catch (e) {
                                        console.error('Error loading PI:', e);
                                    }
                                });
                            }
                        }
                        
                        // 加载当前成员
                        if (membersData.current && membersData.current.length > 0) {
                            const currentContainer = document.getElementById('currentContainer');
                            if (currentContainer) {
                                currentContainer.innerHTML = '';
                                
                                membersData.current.forEach(member => {
                                    try {
                                        const memberElement = document.createElement('div');
                                        memberElement.className = 'bg-white rounded-lg shadow-md p-6 card-hover transition-all-300';
                                        memberElement.innerHTML = `
                                            <div class="w-40 h-40 mx-auto mb-4 rounded-full overflow-hidden">
                                                <img src="${member.image || 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20academic%20portrait%20of%20a%20young%20researcher%2C%20clean%20background%2C%20high%20quality%20professional%20photo&image_size=square_hd'}" alt="团队成员" class="w-full h-full object-cover">
                                            </div>
                                            <h4 class="text-xl font-bold mb-2 text-center editable" contenteditable="false">${member.name}</h4>
                                            <p class="text-gray-600 text-center mb-4 editable" contenteditable="false">${member.title}</p>
                                            <p class="text-gray-600 text-center editable" contenteditable="false">${member.research}</p>
                                        `;
                                        currentContainer.appendChild(memberElement);
                                    } catch (e) {
                                        console.error('Error loading current member:', e);
                                    }
                                });
                            }
                        }
                        
                        // 加载校友
                        if (membersData.alumni && membersData.alumni.length > 0) {
                            const alumniContainer = document.getElementById('alumniContainer');
                            if (alumniContainer) {
                                alumniContainer.innerHTML = '';
                                
                                membersData.alumni.forEach(member => {
                                    try {
                                        const memberElement = document.createElement('div');
                                        memberElement.className = 'bg-white rounded-lg shadow-md p-6 card-hover transition-all-300';
                                        memberElement.innerHTML = `
                                            <h4 class="text-xl font-bold mb-2 editable" contenteditable="false">${member.name}</h4>
                                            <p class="text-gray-600 mb-2 editable" contenteditable="false">${member.degree}</p>
                                            <p class="text-gray-600 editable" contenteditable="false">${member.position}</p>
                                        `;
                                        alumniContainer.appendChild(memberElement);
                                    } catch (e) {
                                        console.error('Error loading alumni member:', e);
                                    }
                                });
                            }
                        }
                    }
                    console.log('Members data loaded successfully');
                } catch (e) {
                    console.error('Error loading members data:', e);
                }
            }

            // 添加成员功能
            function addPI() {
                const piContainer = document.getElementById('piContainer');
                const piElement = document.createElement('div');
                piElement.className = 'bg-white rounded-lg shadow-md p-8 card-hover transition-all-300';
                piElement.innerHTML = `
                    <div class="flex flex-col items-center">
                        <div class="w-48 h-48 rounded-full overflow-hidden mb-6">
                            <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20academic%20portrait%20of%20a%20university%20professor%20in%20formal%20attire%2C%20clean%20background%2C%20high%20quality%20professional%20photo&image_size=square_hd" alt="PI" class="w-full h-full object-cover">
                        </div>
                        <div class="text-center">
                            <h3 class="text-2xl font-bold mb-2 editable" contenteditable="false">Dr. 姓名</h3>
                            <p class="text-gray-600 mb-4 editable" contenteditable="false">Principal Investigator</p>
                            <p class="text-gray-600 mb-4 editable" contenteditable="false">所属学院 | 研究方向 | 专业领域</p>
                            <div class="flex justify-center space-x-4 mt-4">
                                <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                    <i class="fa fa-envelope text-xl"></i>
                                </a>
                                <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                    <i class="fa fa-google-scholar text-xl"></i>
                                </a>
                                <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                    <i class="fa fa-linkedin text-xl"></i>
                                </a>
                                <a href="#" class="text-accent hover:text-primary transition-all-300 editable" contenteditable="false">
                                    <i class="fa fa-researchgate text-xl"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                piContainer.appendChild(piElement);
                saveMembers();
            }

            function addCurrentMember() {
                const currentContainer = document.getElementById('currentContainer');
                const memberElement = document.createElement('div');
                memberElement.className = 'bg-white rounded-lg shadow-md p-6 card-hover transition-all-300';
                memberElement.innerHTML = `
                    <div class="w-40 h-40 mx-auto mb-4 rounded-full overflow-hidden">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20academic%20portrait%20of%20a%20young%20researcher%2C%20clean%20background%2C%20high%20quality%20professional%20photo&image_size=square_hd" alt="团队成员" class="w-full h-full object-cover">
                    </div>
                    <h4 class="text-xl font-bold mb-2 text-center editable" contenteditable="false">成员姓名</h4>
                    <p class="text-gray-600 text-center mb-4 editable" contenteditable="false">职位</p>
                    <p class="text-gray-600 text-center editable" contenteditable="false">研究方向：[研究方向]</p>
                `;
                currentContainer.appendChild(memberElement);
                saveMembers();
            }

            function addAlumni() {
                const alumniContainer = document.getElementById('alumniContainer');
                const alumniElement = document.createElement('div');
                alumniElement.className = 'bg-white rounded-lg shadow-md p-6 card-hover transition-all-300';
                alumniElement.innerHTML = `
                    <h4 class="text-xl font-bold mb-2 editable" contenteditable="false">成员姓名</h4>
                    <p class="text-gray-600 mb-2 editable" contenteditable="false">学位 年份</p>
                    <p class="text-gray-600 editable" contenteditable="false">现在职位：[职位名称]，[机构名称]</p>
                `;
                alumniContainer.appendChild(alumniElement);
                saveMembers();
            }

            // 编辑模式切换功能
            editButton.addEventListener('click', function() {
                // 如果未登录，显示登录对话框
                if (!isAuthenticated) {
                    showLoginModal();
                    return;
                }

                isEditing = !isEditing;
                const editableElements = document.querySelectorAll('.editable');
                editableElements.forEach(element => {
                    element.contentEditable = isEditing;
                    if (isEditing) {
                        element.classList.add('border-b-2', 'border-dashed', 'border-accent');
                    } else {
                        element.classList.remove('border-b-2', 'border-dashed', 'border-accent');
                    }
                });

                // 为照片添加编辑功能
                const photoContainers = document.querySelectorAll('div[class*="rounded-full overflow-hidden"]');
                photoContainers.forEach(container => {
                    if (isEditing) {
                        container.classList.add('cursor-pointer', 'hover:opacity-80', 'transition-all-300');
                        // 检查是否已有文件输入
                        let fileInput = container.querySelector('input[type="file"]');
                        if (!fileInput) {
                            fileInput = document.createElement('input');
                            fileInput.type = 'file';
                            fileInput.accept = 'image/*';
                            fileInput.className = 'hidden';
                            container.appendChild(fileInput);

                            // 添加文件上传处理
                            fileInput.addEventListener('change', function(e) {
                                const file = e.target.files[0];
                                if (file) {
                                    const reader = new FileReader();
                                    const photo = container.querySelector('img');
                                    reader.onload = function(e) {
                                        photo.src = e.target.result;
                                        // 保存到本地存储
                                        saveMembers();
                                    };
                                    reader.readAsDataURL(file);
                                }
                            });
                        }

                        // 添加点击事件
                        container.addEventListener('click', function() {
                            const fileInput = this.querySelector('input[type="file"]');
                            fileInput.click();
                        });
                    } else {
                        container.classList.remove('cursor-pointer', 'hover:opacity-80');
                    }
                });

                // 添加或移除添加按钮
                const containers = [
                    { id: 'piContainer', addFunction: addPI, label: '添加PI' },
                    { id: 'currentContainer', addFunction: addCurrentMember, label: '添加成员' },
                    { id: 'alumniContainer', addFunction: addAlumni, label: '添加校友' }
                ];

                containers.forEach(containerInfo => {
                    const container = document.getElementById(containerInfo.id);
                    const addButtonId = `${containerInfo.id}-add-button`;
                    let addButton = document.getElementById(addButtonId);

                    if (isEditing) {
                        if (!addButton) {
                            addButton = document.createElement('button');
                            addButton.id = addButtonId;
                            addButton.innerHTML = '<i class="fa fa-plus"></i>';
                            addButton.title = containerInfo.label;
                            addButton.className = 'fixed bottom-8 right-8 bg-primary text-white w-12 h-12 rounded-full shadow-lg z-20 hover:bg-secondary transition-all-300 flex items-center justify-center';
                            addButton.style.bottom = `${8 + (containers.indexOf(containerInfo) * 64)}px`;
                            addButton.addEventListener('click', containerInfo.addFunction);
                            document.body.appendChild(addButton);
                        }
                    } else {
                        if (addButton) {
                            addButton.remove();
                        }
                    }
                });

                editButton.innerHTML = isEditing ? '<i class="fa fa-check"></i>' : '<i class="fa fa-pencil"></i>';
                editButton.title = isEditing ? '退出编辑模式' : '编辑模式';
                editButton.classList.toggle('bg-accent');
            });
            
            // 初始化时加载保存的成员数据
            loadMembers();
            
            // 为可编辑元素添加自动保存功能
            document.addEventListener('input', function(e) {
                if (e.target.classList.contains('editable') && isEditing) {
                    console.log('Auto-saving members data...');
                    saveMembers();
                    console.log('Saved members data:', localStorage.getItem('boxlabMembers'));
                }
            });
            
            // 为英雄区域元素添加专门的自动保存功能
            const heroElements = document.querySelectorAll('header .editable');
            heroElements.forEach(element => {
                element.addEventListener('input', function() {
                    if (isEditing) {
                        console.log('Auto-saving hero section data...');
                        saveMembers();
                    }
                });
            });
            
            // 测试本地存储功能
            console.log('Members page loaded');
            console.log('Saved members data:', localStorage.getItem('boxlabMembers'));
        });
    </script>
</body>
</html>
