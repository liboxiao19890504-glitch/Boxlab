# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: liboxiao19890504-glitch/Boxlab          # ← 你仓库地址里的用户名（有 o + -glitch）
  branch: master
  base_url: https://sveltia-cms-auth.liboxia19890504.workers.dev   # ← 你 Cloudflare 截图里的 Worker URL（少 o，保持不变）

media_folder: assets/uploads
public_folder: /uploads

collections:
  - name: pages
    label: 页面内容
    folder: content/pages
    create: true
    fields:
      - { label: 标题, name: title, widget: string, required: true }
      - { label: 发布日期, name: date, widget: datetime }
      - { label: 正文, name: body, widget: markdown }
      - { label: 封面图片, name: image, widget: image }
